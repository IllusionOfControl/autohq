services:
  autohq:
    build:
      context: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD}
      - NUXT_OAUTH_GITHUB_CLIENT_ID=${NUXT_OAUTH_GITHUB_CLIENT_ID}
      - NUXT_OAUTH_GITHUB_CLIENT_SECRET=${NUXT_OAUTH_GITHUB_CLIENT_SECRET}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/autohq
      - OWNER_GITHUB=${OWNER_GITHUB}
      - AUTOHQ_SECRET_TOKEN=${AUTOHQ_SECRET_TOKEN}
      - RESUME_REPO=${RESUME_REPO}
      - RESUME_PATH_EN=${RESUME_PATH_EN}
      - RESUME_PATH_RU=${RESUME_PATH_RU}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - HH_CLIENT_ID=${HH_CLIENT_ID}
      - HH_CLIENT_SECRET=${HH_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      target: builder
    command: [ "npm", "run", "db:migrate" ]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/autohq
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:17-alpine
    container_name: autohq_db
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    # Verify the server is up AND both databases were actually created by the
    # init script. A plain `pg_isready` reports ready during the bootstrap phase
    # (before /docker-entrypoint-initdb.d runs), which would let dependents start
    # before `autohq` / `autohq_n8n` exist. Connecting with psql avoids that race.
    healthcheck:
      test: [ "CMD-SHELL", "psql -U postgres -d autohq -tAc 'SELECT 1' && psql -U postgres -d autohq_n8n -tAc 'SELECT 1'" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: autohq_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Moscow

      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=autohq_n8n
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres

      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy

  # Local, OpenAI-compatible LLM server (llama.cpp). Serves the Gemma model
  # straight from HuggingFace: llama-server downloads the GGUF on first start
  # (the `-hf repo:quant` syntax) and caches it in the llamacpp_models volume,
  # so later starts are offline. Exposes an OpenAI-compatible API at
  # http://llamacpp:8080/v1 (and a /health endpoint) on the compose network —
  # point OPENAI_BASE_URL there to run the n8n Score/Cover nodes against it.
  #
  # CPU image by default. For an NVIDIA GPU, switch the image to
  # `ghcr.io/ggml-org/llama.cpp:server-cuda`, add `--n-gpu-layers 99` to the
  # command, and a GPU reservation under `deploy.resources` (or `--gpus all`).
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: autohq_llamacpp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Where -hf caches downloaded GGUFs; backed by the named volume below.
      - LLAMA_CACHE=/models
    command:
      - "-hf"
      - "unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL"
      # Stable model id the n8n nodes target (instead of the long gguf filename).
      - "--alias"
      - "gemma"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    volumes:
      - llamacpp_models:/models

volumes:
  n8n_data:
  pg_data:
  llamacpp_models: